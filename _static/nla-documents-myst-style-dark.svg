<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="128" viewBox="0 0 1150 128" role="img" aria-labelledby="title desc">
  <title id="title">Bückeburg Archive Research logo</title>
  <desc id="desc">A transparent SVG wordmark with curly braces around the text Bückeburg Archive Research, styled with brighter MyST-inspired blue and orange colors for dark mode.</desc>
  <style>
    .logo {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .brace-dark {
      fill: #fb923c;
      font-size: 76px;
    }
    .word-dark {
      fill: #93c5fd;
      font-size: 64px;
    }
  </style>
  <rect width="100%" height="100%" fill="none"/>
  <text class="logo" x="24" y="84" xml:space="preserve">
    <tspan class="brace-dark">{</tspan><tspan class="word-dark">Bückeburg Archive Research</tspan><tspan class="brace-dark">}</tspan>
  </text>
</svg>
